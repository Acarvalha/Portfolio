<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Anthony Carvalha">
  <meta name="description" content="Get in touch with Anthony Carvalha.">
  <title>Anthony Carvalha | Contact</title>
  <link rel="stylesheet" href="style.css">
  <script src="js/components.js"></script>
  <script src="js/theme.js" defer></script>
  <script src="js/validate.js" defer></script>


</head>
<body data-theme="dark">

<div id="header-placeholder"></div>


  <main>
    <section class="page-header">
      <h1>Get in Touch</h1>
      <p>Have a question, a project idea, or just want to say hi? Send me a message.</p>
    </section>

    <section class="section">
      <div class="contact-wrap">
        <div>

          <form id="contact-form" novalidate>
            <div class="form-group">
              <label for="name">Your Name</label>
              <input type="text" id="name" name="name" placeholder="Jordan Smith">
              <span class="error-msg" id="name-error"></span>
            </div>

            <div class="form-group">
              <label for="email">Your Email</label>
              <input type="email" id="email" name="email" placeholder="jordan@example.com">
              <span class="error-msg" id="email-error"></span>
            </div>

            <div class="form-group">
              <label for="subject">Subject</label>
              <input type="text" id="subject" name="subject" placeholder="What's this about?">
            </div>

            <div class="form-group">
              <label for="message">Your Message</label>
              <textarea id="message" name="message" rows="6" placeholder="Tell me a bit about what you have in mind…"></textarea>
              <span class="error-msg" id="message-error"></span>
            </div>

            <button type="submit" class="btn btn-primary">Send Message</button>
          </form>

          <!-- JS Submission success -->
          <div id="form-success">
            <p class="success-icon">&#10003;</p>
            <h3>Message sent!</h3>
            <p>Thanks for reaching out — I'll get back to you soon.</p>
          </div>
        </div>

        <div class="contact-info">
          <h3>Find Me Elsewhere</h3>
          <p style="color: var(--text-muted); margin-bottom: 8px;">
            Prefer social media? I'm reachable here too.
          </p>
          <div class="social-links">
            <a href="https://www.linkedin.com/in/anthony-carvalha-900632325/" target="_blank" rel="noopener">
              <span class="social-icon">in</span> LinkedIn
            </a>
            <a href="https://github.com/Acarvalha" target="_blank" rel="noopener">
              <span class="social-icon">&lt;/&gt;</span> GitHub
            </a>
            <a href="https://instagram.com/anthonycarvalha" target="_blank" rel="noopener">
              <span class="social-icon">IG</span> Instagram
            </a>
             <a href="https://x.com/0tuca_" target="_blank" rel="noopener">
              <span class="social-icon">X</span> X (formerly Twitter)
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

<div id="footer-placeholder"></div>


</body>
</html>
